name: Daily PM Job Digest

on:
  schedule:
    # Primary slot:   02:17 UTC = 07:47 IST  (off the heavy top-of-hour boundary)
    # Safety-net:     04:17 UTC = 09:47 IST  (catches the day if GitHub skipped/delayed the primary)
    # The dedup state in jobs_seen.json ensures the second run only ships jobs
    # the first run didn't — no duplicate Telegram pings.
    - cron: '17 2 * * *'
    - cron: '17 4 * * *'
  workflow_dispatch:
    # lets us run the workflow on-demand from the GitHub UI

permissions:
  contents: write   # needed to commit the updated jobs_seen.json back

concurrency:
  group: pm-job-digest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25  # 30 LLM calls × ~34s pacing (dual-résumé prompt = bigger tokens) ≈ 17 min, plus scrape/notify overhead
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # use the default GITHUB_TOKEN so we can push back to the repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: github_actions/requirements.txt

      - name: Install dependencies
        run: pip install -r github_actions/requirements.txt

      - name: Inject résumés from secrets (kept out of the public repo)
        env:
          RESUME_AI_FIRST: ${{ secrets.RESUME_AI_FIRST }}
          RESUME_DIGITAL_PAYMENTS: ${{ secrets.RESUME_DIGITAL_PAYMENTS }}
        run: |
          mkdir -p resumes
          echo "$RESUME_AI_FIRST" | base64 -d > resumes/ai_first.txt
          echo "$RESUME_DIGITAL_PAYMENTS" | base64 -d > resumes/digital_payments.txt
          wc -c resumes/*.txt

      - name: Scrape + filter + dedup + route
        working-directory: github_actions
        run: python scrape.py

      - name: Score with Groq Llama 3.3
        working-directory: github_actions
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python match.py

      - name: Notify Telegram
        working-directory: github_actions
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python notify.py

      - name: Commit updated dedup state
        if: always()
        run: |
          if [ -n "$(git status --porcelain jobs_seen.json)" ]; then
            git config user.name  "pm-job-bot"
            git config user.email "pm-job-bot@users.noreply.github.com"
            git add jobs_seen.json
            git commit -m "chore(bot): update jobs_seen.json [skip ci]"
            git push
          else
            echo "no dedup changes to commit"
          fi
